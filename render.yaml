services:
  - type: web
    name: inframantra-crm-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false        # set in the Render dashboard (secret)
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: WORKSPACE_KEY
        sync: false        # must match window.CRM_WORKSPACE_KEY in the frontend
      - key: FRONTEND_URL
        value: https://imcrm.netlify.app
      - key: SEED_ON_BOOT
        value: "true"
      - key: JSON_LIMIT
        value: 25mb
